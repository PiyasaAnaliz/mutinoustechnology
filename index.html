<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutina's Tube</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            background-color: #f4f4f4;
        }
        .profile-section {
            margin-bottom: 10px;
        }
        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #ccc;
        }
        .description {
            font-size: 13px;
            color: #666;
            margin: 5px auto 15px auto;
            max-width: 300px;
            line-height: 1.4;
        }
        .btn {
            display: block;
            width: 90%;
            margin: 8px auto;
            padding: 14px 0;
            text-decoration: none;
            color: white;
            background-color: #333;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        .btn:hover { background-color: #555; }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="profil_fotografin_linki.jpg" alt="Logo" class="profile-img">
        <p class="description">Mutina's Tube - Bağımsız yayıncılık ve topluluk platformu. Tüm güncel içeriklerime buradan ulaşabilirsiniz.</p>
    </div>

    <a href="#" class="btn">YouTube</a>
    <a href="#" class="btn">TikTok</a>
    <a href="#" class="btn">Rumble</a>
    <a href="#" class="btn">Dailymotion</a>
    <a href="#" class="btn">Telegram</a>
    <a href="#" class="btn">Instagram</a>
    <a href="#" class="btn">X</a>
    <a href="#" class="btn">Mastodon</a>
    <a href="#" class="btn">WhatsApp</a>
    <a href="#" class="btn">Patreon</a>
    <a href="#" class="btn">Facebook</a>
    <a href="#" class="btn">Topluluk</a>
    <a href="#" class="btn">İletişim (E-posta)</a>

</body>
</html>
