<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 12px;
            text-align: center;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        
        /* Renkler */
        .btn-youtube { background-color: #FF0000; }
        .btn-tiktok { background-color: #000000; }
        .btn-rumble { background-color: #8cbf3f; }
        .btn-dailymotion { background-color: #0066dc; }
        .btn-telegram { background-color: #0088cc; }
        .btn-instagram { background-color: #E1306C; }
        .btn-x { background-color: #1DA1F2; }
        .btn-patreon { background-color: #FF424D; }
        .btn-facebook { background-color: #1877F2; }
    </style>
</head>
<body>

<div class="container">
    <a href="https://youtube.com/@kullanici_adin" class="btn btn-youtube">YouTube</a>
    <a href="https://tiktok.com/@kullanici_adin" class="btn btn-tiktok">TikTok</a>
    <a href="https://rumble.com/user/kullanici_adin" class="btn btn-rumble">Rumble</a>
    <a href="https://dailymotion.com/kullanici_adin" class="btn btn-dailymotion">Dailymotion</a>
    <a href="https://t.me/kullanici_adin" class="btn btn-telegram">Telegram</a>
    <a href="https://instagram.com/kullanici_adin" class="btn btn-instagram">Instagram</a>
    <a href="https://x.com/kullanici_adin" class="btn btn-x">X (Twitter)</a>
    <a href="https://patreon.com/kullanici_adin" class="btn btn-patreon">Patreon</a>
    <a href="https://facebook.com/kullanici_adin" class="btn btn-facebook">Facebook</a>
</div>

</body>
</html>
